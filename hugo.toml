baseURL = 'https://gearmo3ds.github.io/'
locale = 'en-us'
title = 'Handheld Music'
theme = 'ananke'
[caches]
  [caches.images]
    dir = ':cacheDir/images'

[taxonomies]
  category = 'categories'
  tag = 'tags'
  creator = 'creators'
  console = 'consoles'
  app = 'apps'

[params]
  recent_posts_number = 10

[params.ananke]
  show_recent_posts = true

[security]
  allowContent = ['^text/html$', '^text/plain$',  '^text/markdown$']

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts"
    weight = 10

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about"
    weight = 20

  [[menu.main]]
    identifier = "other"
    name = "Other"
    url = "/other"
    weight = 20
