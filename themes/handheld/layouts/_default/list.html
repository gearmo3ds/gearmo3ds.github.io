{{ range (.Paginate site.RegularPages 10).Pages }}

<div class="card mb-4">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>

    {{ with .Params.youtube }}
    <div class="ratio ratio-16x9">
        <iframe
            src="https://www.youtube.com/embed/{{ . }}"
            allowfullscreen>
        </iframe>
    </div>
    {{ end }}

    {{ .Summary }}

</div>

{{ end }}
