{{ partial "header.html" . }}

{{ range.Data.Pages }}

<div class="w-50 mx-auto my-4">
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>

    {{ with .Params.youtube }}
    <div class="ratio ratio-16x9">
        <iframe
            src="https://www.youtube.com/embed/{{ . }}"
            allowfullscreen>
        </iframe>
    </div>
    {{ end }}

    {{ .Summary }}
</div>

{{ end }}

{{ partial "footer.html" . }}
